<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time It</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="game-box">

    <h1>Time It</h1>

    <div id="target-section">
      <div id="target-label">Target time</div>
      <div id="target-display">—</div>
    </div>

    <div id="countdown"></div>

    <div id="message">Click START to begin.</div>

    <div id="result-block">
      <div id="result-title">Your time</div>
      <div id="result-your-time"></div>
      <div id="result-diff"></div>
    </div>

    <button id="play-btn">Start</button>

    <div id="click-hint">Click anywhere to stop</div>

  </div>

  <script src="game.js"></script>
</body>
</html>
